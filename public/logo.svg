<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0e1a"/>
      <stop offset="1" stop-color="#06070d"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" fill="none" stroke="url(#mark)" stroke-opacity="0.5" stroke-width="1"/>

  <g filter="url(#glow)">
    <rect x="14" y="16" width="5" height="32" rx="1.5" fill="url(#mark)"/>
    <path d="M21 18 L35 32 L21 46" fill="none" stroke="url(#mark)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="44" cy="32" r="3" fill="url(#mark)"/>
  </g>

  <rect x="14" y="54" width="36" height="2" rx="1" fill="url(#mark)" opacity="0.55"/>
</svg>
