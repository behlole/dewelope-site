<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0e1a"/>
      <stop offset="1" stop-color="#06070d"/>
    </linearGradient>
    <radialGradient id="glowL" cx="220" cy="160" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="1020" cy="520" r="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(124,92,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glowL)"/>
  <rect width="1200" height="630" fill="url(#glowR)"/>

  <g transform="translate(90 86)">
    <rect width="128" height="128" rx="28" fill="none" stroke="url(#mark)" stroke-width="2" stroke-opacity="0.6"/>
    <rect x="28" y="32" width="10" height="64" rx="3" fill="url(#mark)"/>
    <path d="M42 36 L70 64 L42 92" fill="none" stroke="url(#mark)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="88" cy="64" r="6" fill="url(#mark)"/>
  </g>

  <g transform="translate(244 112)">
    <text font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-weight="700" font-size="56" letter-spacing="-2">
      <tspan fill="#ffffff">de</tspan><tspan fill="url(#accent)">we</tspan><tspan fill="#ffffff">lope</tspan>
    </text>
    <text y="44" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="20" letter-spacing="8" fill="#22d3ee"
