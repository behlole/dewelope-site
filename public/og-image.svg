  <text x="90" y="320"
        font-family="'Space Grotesk','Inter',system-ui,sans-serif"
        font-weight="700" font-size="88" letter-spacing="-2" fill="#ffffff">We ship modern platforms</text>
  <text x="90" y="412"
        font-family="'Space Grotesk','Inter',system-ui,sans-serif"
        font-weight="700" font-size="88" letter-spacing="-2" fill="url(#accent)">at banking scale.</text>

  <g font-family="'JetBrains Mono',ui-monospace,monospace" font-size="20" fill="#9aa3c7">
    <text x="90" y="500">FULL-STACK  ·  MICROSERVICES  ·  FINTECH  ·  AI INTEGRATION  ·  CLOUD</text>
    <text x="90" y="540">TRUSTED BY TEAMS BEHIND EASYPAISA  ·  JAZZCASH  ·  FOODPANDA  ·  ZTBL</text>
  </g>

  <g transform="translate(90 578)">
    <circle cx="6" cy="6" r="6" fill="#a3e635"/>
    <text x="22" y="6" dominant-baseline="central"
          font-family="'JetBrains Mono',ui-monospace,monospace"
          font-size="18" letter-spacing="4" fill="#e8eaf2"
          style="text-transform:uppercase">dewelope.com  ·  available for new engagements</text>
